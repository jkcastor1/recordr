<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .controls { margin: 20px 0; }
        input[type="number"] {
            padding: 8px;
            font-size: 16px;
            width: 80px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            margin: 5px;
        }
        #startBtn { background-color: #3b82f6; color: white; }
        #startBtn:hover { background-color: #2563eb; }
        #startBtn:disabled { background-color: #93c5fd; cursor: not-allowed; }
        
        #stopBtn { background-color: #ef4444; color: white; display: none; }
        #stopBtn:hover { background-color: #dc2626; }

        #timer {
            font-size: 24px;
            font-weight: bold;
            color: #ef4444;
            margin: 15px 0;
            display: none;
        }
        #preview {
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
            background: #000;
        }
        #downloadBtn {
            background-color: #10b981;
            color: white;
            display: none;
            width: 100%;
            margin-top: 15px;
            text-decoration: none;
            box-sizing: border-box;
            padding: 12px;
        }
        #downloadBtn:hover { background-color: #059669; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎥 Screen Recorder</h1>
        <p>Record your screen directly from your browser.</p>

        <div class="controls">
            <label for="duration"><strong>Duration:</strong></label>
            <input type="number" id="duration" value="5" min="1"> seconds
        </div>

        <button id="startBtn">Start Recording</button>
        <button id="stopBtn">Stop Early</button>

        <div id="timer">00:00</div>

        <video id="preview" controls></video>
        <a id="downloadBtn" download="demo_video.webm">⬇️ Download Video</a>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const durationInput = document.getElementById('duration');
        const timerDisplay = document.getElementById('timer');
        const previewVideo = document.getElementById('preview');
        const downloadBtn = document.getElementById('downloadBtn');

        let mediaRecorder;
        let stream;
        let chunks = [];
        let countdownInterval;
        let timeLeft;

        async function startRecording() {
            try {
                // Request screen sharing
                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: true // Captures system audio if user allows it
                });

                // Set up recorder
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                chunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                mediaRecorder.onstop = handleStop;

                // UI Updates
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                timerDisplay.style.display = 'block';
                previewVideo.style.display = 'none';
                downloadBtn.style.display = 'none';
                durationInput.disabled = true;

                // Start Timer
                timeLeft = parseInt(durationInput.value);
                updateTimerDisplay();
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        stopRecording();
                    }
                }, 1000);

                // Start actual recording
                mediaRecorder.start();

            } catch (err) {
                console.error("Error accessing screen:", err);
                alert("Permission denied or error accessing screen capture.");
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        }

        function handleStop() {
            // Stop all tracks to turn off the "Sharing Screen" browser indicator
            stream.getTracks().forEach(track => track.stop());
            clearInterval(countdownInterval);

            // Create video file (Blob)
            const blob = new Blob(chunks, { type: 'video/webm' });
            const videoURL = URL.createObjectURL(blob);

            // Set up preview
            previewVideo.src = videoURL;
            previewVideo.style.display = 'block';

            // Set up download button
            downloadBtn.href = videoURL;
            downloadBtn.style.display = 'block';

            // Reset UI
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            timerDisplay.style.display = 'none';
            durationInput.disabled = false;
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const seconds = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `Recording: ${minutes}:${seconds}`;
        }

        // Event Listeners
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
    </script>
</body>
</html>
